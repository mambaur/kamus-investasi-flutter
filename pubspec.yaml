name: kamus_investasi
description: Kamus Investasi.

publish_to: 'none'

version: 1.0.7+8

environment:
  sdk: ">=2.17.3 <3.0.0"
  
dependencies:
  flutter:
    sdk: flutter
  upgrader: ^12.5.0
  iconsax: ^0.0.8
  google_fonts: ^8.0.2
  sqflite: ^2.3.0
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  path_provider: ^2.1.2
  infinite_scroll_pagination: ^5.1.1
  infinite_scroll: ^1.1.1
  share_plus: ^12.0.1
  clipboard: ^3.0.14
  google_mobile_ads: ^7.0.0
  url_launcher: ^6.1.5

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/datasets/dictionaries.json
    - assets/images/bookmark.png
    - assets/images/history.png
    - assets/images/feedback.png
    - assets/images/launcher_icon.jpg
